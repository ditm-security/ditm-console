<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiTM Armor Console</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Outfit","Segoe UI",Arial,sans-serif;background:#eef3f7;color:#182631;background-image:radial-gradient(circle at top left,rgba(73,107,142,.12),transparent 26%),radial-gradient(circle at top right,rgba(74,130,111,.08),transparent 22%)}
.shell{max-width:1120px;margin:0 auto;padding:28px 24px 40px}
.card{background:#fbfdff;border:1px solid #d6e0ea;border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 10px 30px rgba(24,38,49,.05)}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.hero .card{max-width:480px;width:100%;box-shadow:0 28px 80px rgba(24,38,49,.08)}
.top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.logo{width:36px;height:36px;border-radius:10px;background:#496b8e;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.32)}
.sub{color:#627487;font-size:13px;line-height:1.6}
.input,.select{width:100%;padding:12px 14px;border:1px solid #d6e0ea;border-radius:10px;background:#f3f7fb;font:inherit;color:#182631}
.input:focus,.select:focus{outline:none;border-color:#496b8e;box-shadow:0 0 0 3px rgba(73,107,142,.10)}
.label{font-size:12px;color:#627487;margin:12px 0 6px}
.btn{border:0;border-radius:10px;padding:11px 16px;font:inherit;cursor:pointer;transition:all .18s ease}
.btn-primary{background:#496b8e;color:#fff}
.btn-primary:hover{background:#3f5f7e}
.btn-secondary{background:#fff;border:1px solid #d6e0ea;color:#506274}
.btn-secondary:hover{border-color:#496b8e;color:#31475f}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
.pill{display:inline-flex;padding:4px 10px;border-radius:999px;font-size:11px;border:1px solid #d6e0ea;color:#506274;background:#fff}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.metric-val{font-size:30px;font-weight:700;color:#182631}
.metric-label{font-size:13px;color:#627487;margin-bottom:6px}
.metric-sub{font-size:12px;color:#8190a0}
.list{display:flex;flex-direction:column}
.list-item{display:flex;gap:12px;align-items:center;padding:12px 0;border-top:1px solid #e8eef5}
.list-item:first-child{border-top:0}
.sev-critical,.sev-high,.sev-medium,.sev-low,.act-blocked,.act-warned,.act-monitored,.act-active,.act-inactive{padding:4px 10px;border-radius:999px;font-size:11px;border:1px solid transparent}
.sev-critical,.act-blocked{background:#f9ecef;color:#a85f72;border-color:#e8c7d0}
.sev-high,.act-warned{background:#fbf2e4;color:#b28a49;border-color:#ecd7b0}
.sev-medium{background:#eef3f7;color:#627487;border-color:#d6e0ea}
.sev-low,.act-inactive{background:#f6f8fb;color:#7a8796;border-color:#e4e9ef}
.act-monitored,.act-active{background:#edf5f1;color:#4a826f;border-color:#cfe0d8}
.mono{font-family:Consolas,monospace;font-size:12px}
.hint{background:#f3f7fb;border:1px solid #dce5ee;border-radius:12px;padding:12px 14px}
.err{display:none;background:#f9ecef;color:#8d4558;border:1px solid #e8c7d0;border-radius:10px;padding:10px 12px;font-size:12px;margin-top:10px}
.section-title{font-size:14px;font-weight:600;margin-bottom:10px;color:#1d3042}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.meta{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-top:1px solid #e8eef5}
.meta:first-child{border-top:0}
.meta-key{font-size:12px;color:#627487}
.meta-val{font-size:12px;font-family:Consolas,monospace;text-align:right;word-break:break-all;color:#182631}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{padding:8px 14px;border-radius:999px;border:1px solid transparent;background:transparent;color:#627487;cursor:pointer;transition:all .18s ease}
.tab:hover{color:#31475f}
.tab.active{background:#e7eef7;border-color:#d3deea;color:#31475f}
.hidden{display:none}
@media(max-width:760px){.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CONSOLE_DEFAULTS={url:'https://zujbvoqvhyocojrpcyyl.supabase.co',key:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1amJ2b3F2aHlvY29qcnBjeXlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NDEzNzIsImV4cCI6MjA4OTExNzM3Mn0.dXPedSQxdAhPthxF32jPlr3Md86CP0RbJeG29_aK1xs'};
const STORAGE_KEY='ditm-console-auth-v1';
const $=(s,c=document)=>c.querySelector(s);
const el=(tag,attrs={},...children)=>{const n=document.createElement(tag);for(const[k,v]of Object.entries(attrs)){if(k==='className')n.className=v;else if(k==='style')Object.assign(n.style,v);else if(k==='html')n.innerHTML=v;else if(k.startsWith('on'))n.addEventListener(k.slice(2).toLowerCase(),v);else n.setAttribute(k,v);}for(const child of children){if(typeof child==='string')n.appendChild(document.createTextNode(child));else if(child)n.appendChild(child);}return n;};

let state={page:'login',tab:'dashboard',session:null,user:null,org:null,orgs:[],memberships:[],role:null,detections:[],agents:[],policies:null,selected:null};
let pollTimer=null;

function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify({auth:state.session,orgId:state.org?.id||null,user:state.user||null}));}
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');}catch{return null;}}
function clearState(){localStorage.removeItem(STORAGE_KEY);}
function setSession(session,userOverride=null){if(!session?.access_token){state.session=null;state.user=null;return;}state.session={access_token:session.access_token,refresh_token:session.refresh_token,expires_at:session.expires_at||(session.expires_in?Math.floor(Date.now()/1000)+session.expires_in:null),token_type:session.token_type||'bearer'};state.user=userOverride||session.user||state.user;}
function authToken(){return state.session?.access_token||CONSOLE_DEFAULTS.key;}
function expired(skew=60){if(!state.session?.access_token)return true;if(!state.session.expires_at)return false;return state.session.expires_at<=Math.floor(Date.now()/1000)+skew;}
async function authFetch(path,method='GET',body=null,token=null){try{const opts={method,headers:{'Content-Type':'application/json','apikey':CONSOLE_DEFAULTS.key}};if(token)opts.headers.Authorization=`Bearer ${token}`;if(body)opts.body=JSON.stringify(body);const r=await fetch(`${CONSOLE_DEFAULTS.url}/auth/v1/${path}`,opts);if(!r.ok)return null;const t=await r.text();return t?JSON.parse(t):null;}catch{return null;}}
async function sbFetch(path,method='GET',body=null){try{const opts={method,headers:{'Content-Type':'application/json','apikey':CONSOLE_DEFAULTS.key,'Authorization':`Bearer ${authToken()}`}};if(method==='POST'||method==='PATCH')opts.headers.Prefer='return=representation';if(body)opts.body=JSON.stringify(body);const r=await fetch(`${CONSOLE_DEFAULTS.url}/rest/v1/${path}`,opts);if(!r.ok)return null;const t=await r.text();return t?JSON.parse(t):null;}catch{return null;}}
async function refreshSession(){if(!state.session?.refresh_token)return false;const next=await authFetch('token?grant_type=refresh_token','POST',{refresh_token:state.session.refresh_token});if(!next?.access_token)return false;setSession(next,next.user||state.user);if(!state.user){const user=await authFetch('user','GET',null,state.session.access_token);if(!user)return false;state.user=user;}saveState();return true;}
function ago(iso){if(!iso)return'-';const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<1)return'now';if(m<60)return`${m}m`;if(m<1440)return`${Math.floor(m/60)}h`;return`${Math.floor(m/1440)}d`;}
function fmt(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function resetApp(){if(pollTimer)clearInterval(pollTimer);pollTimer=null;state={page:'login',tab:'dashboard',session:null,user:null,org:null,orgs:[],memberships:[],role:null,detections:[],agents:[],policies:null,selected:null};}

async function loadOrgContext(){if(!state.user?.id)return false;const memberships=await sbFetch(`org_memberships?user_id=eq.${state.user.id}&select=org_id,role`);if(!memberships?.length)return false;const ids=[...new Set(memberships.map(m=>m.org_id).filter(Boolean))];const orgs=await sbFetch(`orgs?id=in.(${ids.join(',')})&select=id,name,enrollment_token`);if(!orgs?.length)return false;const saved=loadState();state.memberships=memberships;state.orgs=orgs.sort((a,b)=>(a.name||'').localeCompare(b.name||''));state.org=state.orgs.find(org=>org.id===saved?.orgId)||state.orgs[0];state.role=memberships.find(m=>m.org_id===state.org.id)?.role||'admin';state.page='app';saveState();await loadData();startPolling();return true;}
async function loadData(){if(!state.org)return;const oid=state.org.id;const[detections,agents,policies]=await Promise.all([sbFetch(`detections?org_id=eq.${oid}&order=created_at.desc&limit=200`),sbFetch(`agents?org_id=eq.${oid}&order=last_seen_at.desc`),sbFetch(`policies?org_id=eq.${oid}&limit=1`)]);state.detections=detections||[];state.agents=agents||[];state.policies=(policies&&policies[0])||null;render();}
function startPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(loadData,5000);}

async function login(){const email=($('#login-email')?.value||'').trim().toLowerCase();const password=($('#login-password')?.value||'').trim();const err=$('#login-error');err.style.display='none';if(!email||!password){err.textContent='Enter your work email and password.';err.style.display='block';return;}$('#login-btn').textContent='Signing in...';const session=await authFetch('token?grant_type=password','POST',{email,password});if(!session?.access_token){err.textContent='Sign-in failed. Check your company admin credentials.';err.style.display='block';$('#login-btn').textContent='Sign in';return;}setSession(session,session.user||null);if(!state.user){const user=await authFetch('user','GET',null,state.session.access_token);if(!user){err.textContent='Signed in, but could not load the account profile.';err.style.display='block';$('#login-btn').textContent='Sign in';return;}state.user=user;}const ok=await loadOrgContext();if(!ok){logout(false);err.textContent='This admin account is not assigned to an organization yet.';err.style.display='block';$('#login-btn').textContent='Sign in';return;}}
function logout(renderNow=true){clearState();resetApp();if(renderNow)render();}
async function restore(){render();const saved=loadState();if(!saved?.auth?.access_token)return;setSession(saved.auth,saved.user||null);if(expired()){const ok=await refreshSession();if(!ok){logout();return;}}else if(!state.user){const user=await authFetch('user','GET',null,state.session.access_token);if(!user){const ok=await refreshSession();if(!ok){logout();return;}}else state.user=user;}const ok=await loadOrgContext();if(!ok)logout();}
async function updatePolicies(next){state.policies=next;render();if(!state.org)return;await sbFetch(`policies?org_id=eq.${state.org.id}`,'PATCH',{enforcement_mode:next.enforcement_mode,protected_brands:next.protected_brands,allowlist:next.allowlist,blocklist:next.blocklist,modules:next.modules,updated_at:new Date().toISOString()});}

function renderLogin(root){const shell=el('div',{className:'hero'});const card=el('div',{className:'card'});card.appendChild(el('div',{className:'top'},el('div',{className:'logo',html:'<svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="#fff" stroke-width="1.5"/><circle cx="16" cy="16" r="3" fill="#fff"/></svg>'}),el('div',{},el('div',{style:{fontWeight:'700'}},'DiTM Armor Console'),el('div',{className:'sub'},'Sign in with your company admin account.'))));card.appendChild(el('div',{className:'hint',style:{marginBottom:'14px'}},'Each admin account only sees its own org. Agents enrolled with your company token will stream detections into this dashboard.'));card.appendChild(el('div',{className:'label'},'Work email'));card.appendChild(el('input',{id:'login-email',className:'input',type:'email',placeholder:'security@company.com',autocomplete:'username'}));card.appendChild(el('div',{className:'label'},'Password'));const password=el('input',{id:'login-password',className:'input',type:'password',placeholder:'Enter your password',autocomplete:'current-password'});password.addEventListener('keydown',e=>{if(e.key==='Enter')login();});card.appendChild(password);card.appendChild(el('div',{id:'login-error',className:'err'}));card.appendChild(el('button',{id:'login-btn',className:'btn btn-primary',style:{width:'100%',marginTop:'14px'},onClick:login},'Sign in'));shell.appendChild(card);root.appendChild(shell);}

function renderHeader(shell){const row=el('div',{className:'card'},el('div',{className:'row'},el('div',{className:'logo',html:'<svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="#fff" stroke-width="1.5"/><circle cx="16" cy="16" r="3" fill="#fff"/></svg>'}),el('div',{},el('div',{style:{fontWeight:'700'}},'DiTM Armor'),el('div',{className:'sub'},state.org?.name||'...')),el('div',{className:'grow'}),el('div',{className:'sub'},state.user?.email||''),state.orgs.length>1?buildOrgSelect():null,el('span',{className:'pill'},state.role||'admin'),el('button',{className:'btn btn-secondary',onClick:()=>logout()},'Log out')));shell.appendChild(row);}
function buildOrgSelect(){const select=el('select',{className:'select',style:{maxWidth:'240px'},onChange:async e=>{state.org=state.orgs.find(org=>org.id===e.target.value)||state.orgs[0];state.role=state.memberships.find(m=>m.org_id===state.org.id)?.role||'admin';saveState();await loadData();}});for(const org of state.orgs){const option=el('option',{value:org.id},org.name);if(org.id===state.org?.id)option.selected=true;select.appendChild(option);}return select;}
function renderTabs(shell){const tabs=el('div',{className:'tabs'});for(const[key,label]of[['dashboard','Dashboard'],['alerts','Alerts'],['agents','Agents'],['policies','Policies'],['deployment','Deployment']])tabs.appendChild(el('button',{className:`tab ${state.tab===key||(state.tab==='detail'&&key==='alerts')?'active':''}`,onClick:()=>{state.tab=key;state.selected=null;render();}},label));shell.appendChild(tabs);}

function renderDashboard(shell){const blocked=state.detections.filter(d=>d.action_taken==='blocked').length;const warned=state.detections.filter(d=>d.action_taken==='warned').length;const monitored=state.detections.filter(d=>d.action_taken==='monitored').length;const critical=state.detections.filter(d=>d.severity==='critical').length;const active=state.agents.filter(a=>a.status==='active').length;const metrics=el('div',{className:'metric-grid',style:{marginBottom:'16px'}});for(const[label,val,sub]of[['Detections',state.detections.length,'Last 7 days'],['Blocked',blocked,`${critical} critical`],['Warned',warned,'User notified'],['Monitored',monitored,'Silent'],['Agents',`${active} / ${state.agents.length}`,'Online']])metrics.appendChild(el('div',{className:'card'},el('div',{className:'metric-label'},label),el('div',{className:'metric-val'},String(val)),el('div',{className:'metric-sub'},sub)));shell.appendChild(metrics);const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},'Recent detections'));if(!state.detections.length){card.appendChild(el('div',{className:'sub'},'No detections yet. Enroll agents to start seeing live pilot data.'));shell.appendChild(card);return;}const list=el('div',{className:'list'});for(const det of state.detections.slice(0,10)){list.appendChild(el('div',{className:'list-item',onClick:()=>{state.selected=det;state.tab='detail';render();}},el('span',{className:`sev-${det.severity}`},det.severity),el('div',{className:'grow'},el('div',{style:{fontWeight:'600',fontSize:'13px'}},det.title),el('div',{className:'mono',style:{color:'#94a3b8'}},det.domain||det.url||'')),el('span',{className:`act-${det.action_taken}`},det.action_taken),el('div',{className:'mono'},ago(det.created_at))))}card.appendChild(list);shell.appendChild(card);}

function renderAlerts(shell){const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},'All detections'));if(!state.detections.length){card.appendChild(el('div',{className:'sub'},'No detections yet.'));shell.appendChild(card);return;}for(const det of state.detections){card.appendChild(el('div',{className:'list-item',onClick:()=>{state.selected=det;state.tab='detail';render();}},el('span',{className:`sev-${det.severity}`},det.severity),el('div',{className:'grow'},el('div',{style:{fontWeight:'600',fontSize:'13px'}},det.title),el('div',{className:'mono',style:{color:'#94a3b8'}},det.domain||'')),el('span',{className:`act-${det.action_taken}`},det.action_taken),el('div',{className:'mono'},ago(det.created_at))))}shell.appendChild(card);}

function renderDetail(shell){if(!state.selected)return;const det=state.selected;shell.appendChild(el('button',{className:'btn btn-secondary',style:{marginBottom:'12px'},onClick:()=>{state.tab='alerts';render();}},'Back'));const top=el('div',{className:'card'});top.appendChild(el('div',{className:'row',style:{marginBottom:'10px'}},el('span',{className:`sev-${det.severity}`},det.severity),el('span',{className:`act-${det.action_taken}`},det.action_taken),el('span',{className:'pill'},`Score ${det.risk_score||0}`)));top.appendChild(el('div',{style:{fontSize:'22px',fontWeight:'700',marginBottom:'6px'}},det.title));top.appendChild(el('div',{className:'mono',style:{color:'#64748b'}},`${det.domain||''} - ${det.user_email||det.agent_id||''}`));shell.appendChild(top);const grid=el('div',{className:'detail-grid'});const meta=el('div',{className:'card'},el('div',{className:'section-title'},'Metadata'));for(const[k,v]of[['Time',fmt(det.created_at)],['URL',det.url],['Domain',det.domain],['Agent',det.agent_id],['Module',det.module],['Score',det.risk_score]])meta.appendChild(el('div',{className:'meta'},el('span',{className:'meta-key'},k),el('span',{className:'meta-val'},String(v||'-'))));const signals=el('div',{className:'card'},el('div',{className:'section-title'},'Signals'));const items=Array.isArray(det.signals)?det.signals:[];if(!items.length)signals.appendChild(el('div',{className:'sub'},'No signals recorded'));for(const signal of items)signals.appendChild(el('div',{className:'hint',style:{marginBottom:'8px'}},typeof signal==='string'?signal:(signal.label||JSON.stringify(signal))));grid.appendChild(meta);grid.appendChild(signals);shell.appendChild(grid);}

function renderAgents(shell){const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},`Agents (${state.agents.length})`));if(!state.agents.length){card.appendChild(el('div',{className:'sub'},'No agents enrolled yet.'));shell.appendChild(card);return;}for(const agent of state.agents){card.appendChild(el('div',{className:'list-item'},el('div',{className:'grow'},el('div',{style:{fontWeight:'600',fontSize:'13px'}},(agent.user_email||agent.id).split('@')[0]),el('div',{className:'mono',style:{color:'#94a3b8'}},`${agent.browser||'-'} | ${agent.agent_version||'-'} | ${agent.device_name||'-'}`)),el('span',{className:`act-${agent.status}`},agent.status),el('div',{className:'mono'},ago(agent.last_seen_at))))}shell.appendChild(card);}

function renderPolicies(shell){const p=state.policies;const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},'Policies'));if(!p){card.appendChild(el('div',{className:'sub'},'Loading policies...'));shell.appendChild(card);return;}const modeRow=el('div',{className:'row',style:{marginBottom:'14px'}});for(const mode of['block','warn','monitor'])modeRow.appendChild(el('button',{className:'btn '+(p.enforcement_mode===mode?'btn-primary':'btn-secondary'),onClick:()=>updatePolicies({...p,enforcement_mode:mode})},mode));card.appendChild(modeRow);for(const[key,label]of[['protected_brands','Protected brands'],['blocklist','Blocklist'],['allowlist','Allowlist']]){card.appendChild(el('div',{className:'label'},label));const hint=el('div',{className:'hint'});const items=Array.isArray(p[key])?p[key]:[];hint.textContent=items.length?items.join(', '):'No entries yet';card.appendChild(hint);}shell.appendChild(card);}

function renderDeployment(shell){const model=el('div',{className:'card'});model.appendChild(el('div',{className:'section-title'},'Pilot model'));model.appendChild(el('div',{className:'sub'},'This is a shared DiTM Armor console. Your admin login is scoped to your org, and the enrollment token below attaches browser agents only to your company.'));shell.appendChild(model);const token=el('div',{className:'card'});token.appendChild(el('div',{className:'section-title'},'Organization enrollment token'));token.appendChild(el('div',{className:'sub',style:{marginBottom:'10px'}},'Share this with employees during agent setup.'));token.appendChild(el('div',{className:'hint mono'},state.org?.enrollment_token||'...'));shell.appendChild(token);const ctx=el('div',{className:'card'});ctx.appendChild(el('div',{className:'section-title'},'Current admin context'));ctx.appendChild(el('div',{className:'hint mono',style:{marginBottom:'8px'}},`Signed in as: ${state.user?.email||'...'}`));ctx.appendChild(el('div',{className:'hint mono',style:{marginBottom:'8px'}},`Organization: ${state.org?.name||'...'}`));ctx.appendChild(el('div',{className:'hint mono'},`Role: ${state.role||'admin'}`));shell.appendChild(ctx);}

function render(){const app=$('#app');app.innerHTML='';if(state.page==='login'){renderLogin(app);return;}const shell=el('div',{className:'shell'});app.appendChild(shell);renderHeader(shell);renderTabs(shell);if(state.tab==='dashboard')renderDashboard(shell);else if(state.tab==='alerts')renderAlerts(shell);else if(state.tab==='detail')renderDetail(shell);else if(state.tab==='agents')renderAgents(shell);else if(state.tab==='policies')renderPolicies(shell);else if(state.tab==='deployment')renderDeployment(shell);}

restore();
</script>
</body>
</html>
