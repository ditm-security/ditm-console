<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiTM Armor Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#06060b;
--surface:#0c0c14;
--surface-2:#12121e;
--surface-3:#171726;
--border:#1a1a2e;
--border-strong:#2a2a42;
--accent:#ff3366;
--accent-soft:rgba(255,51,102,.12);
--accent-glow:rgba(255,51,102,.28);
--safe:#00ff88;
--warn:#ffaa00;
--danger:#ff3366;
--text:#e8e8f0;
--text-mid:#9a9ab0;
--text-dim:#6a6a88;
--mono:"JetBrains Mono",Consolas,monospace;
--sans:"Outfit","Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
margin:0;
font-family:var(--sans);
color:var(--text);
background:
radial-gradient(circle at top left,rgba(255,51,102,.14),transparent 24%),
radial-gradient(circle at top right,rgba(255,170,0,.08),transparent 18%),
linear-gradient(180deg,rgba(18,18,30,.72),rgba(6,6,11,1));
background-color:var(--bg);
overflow-x:hidden;
}
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
linear-gradient(rgba(255,51,102,.035) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,51,102,.035) 1px,transparent 1px);
background-size:64px 64px;
opacity:.7;
}
body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);
opacity:.2;
}
#app,.shell,.hero{position:relative;z-index:1}
.shell{max-width:1120px;margin:0 auto;padding:28px 24px 40px}
.card{
background:linear-gradient(180deg,rgba(18,18,30,.96),rgba(12,12,20,.94));
border:1px solid var(--border);
border-radius:18px;
padding:20px;
margin-bottom:16px;
box-shadow:0 18px 50px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.03);
}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.hero .card{max-width:500px;width:100%;box-shadow:0 30px 90px rgba(0,0,0,.4),0 0 0 1px rgba(255,51,102,.08)}
.top{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.logo{
width:38px;
height:38px;
border-radius:12px;
background:linear-gradient(180deg,rgba(255,51,102,.24),rgba(255,51,102,.08));
border:1px solid rgba(255,51,102,.24);
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 0 1px rgba(255,51,102,.08),0 10px 24px rgba(255,51,102,.18);
}
.sub{color:var(--text-dim);font-size:13px;line-height:1.6}
.input,.select{
width:100%;
padding:12px 14px;
border:1px solid var(--border-strong);
border-radius:12px;
background:rgba(10,10,18,.88);
font:inherit;
color:var(--text);
}
.input::placeholder{color:var(--text-dim)}
.input:focus,.select:focus{
outline:none;
border-color:rgba(255,51,102,.6);
box-shadow:0 0 0 3px rgba(255,51,102,.12);
}
.label{
font-size:12px;
font-family:var(--mono);
letter-spacing:.08em;
text-transform:uppercase;
color:var(--text-dim);
margin:12px 0 6px;
}
.btn{
border:0;
border-radius:12px;
padding:11px 16px;
font:inherit;
cursor:pointer;
transition:all .18s ease;
}
.btn-primary{
background:var(--accent);
color:#fff;
box-shadow:0 12px 28px rgba(255,51,102,.22);
}
.btn-primary:hover{
background:#e6294f;
transform:translateY(-1px);
box-shadow:0 16px 36px rgba(255,51,102,.28);
}
.btn-secondary{
background:rgba(12,12,20,.92);
border:1px solid var(--border-strong);
color:var(--text-mid);
}
.btn-secondary:hover{
border-color:rgba(255,51,102,.3);
color:var(--text);
transform:translateY(-1px);
}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.grow{flex:1}
.pill{
display:inline-flex;
padding:4px 10px;
border-radius:999px;
font-size:11px;
font-family:var(--mono);
border:1px solid var(--border-strong);
color:var(--text-mid);
background:rgba(18,18,30,.88);
}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.metric-val{font-size:30px;font-weight:700;color:var(--text)}
.metric-label{font-size:13px;color:var(--text-mid);margin-bottom:6px}
.metric-sub{font-size:12px;color:var(--text-dim)}
.list{display:flex;flex-direction:column}
.list-item{
display:flex;
gap:12px;
align-items:center;
padding:12px 0;
border-top:1px solid rgba(255,255,255,.06);
}
.list-item:first-child{border-top:0}
.sev-critical,.sev-high,.sev-medium,.sev-low,.act-blocked,.act-warned,.act-monitored,.act-active,.act-inactive{
padding:4px 10px;
border-radius:999px;
font-size:11px;
font-family:var(--mono);
border:1px solid transparent;
}
.sev-critical,.act-blocked{background:rgba(255,51,102,.12);color:#ff7a98;border-color:rgba(255,51,102,.22)}
.sev-high,.act-warned{background:rgba(255,170,0,.12);color:#ffc766;border-color:rgba(255,170,0,.22)}
.sev-medium{background:rgba(74,74,100,.22);color:#b4b4cd;border-color:rgba(122,122,160,.2)}
.sev-low,.act-inactive{background:rgba(255,255,255,.04);color:#8e8ea8;border-color:rgba(255,255,255,.08)}
.act-monitored,.act-active{background:rgba(0,255,136,.1);color:#7cffb7;border-color:rgba(0,255,136,.18)}
.mono{font-family:var(--mono);font-size:12px}
.hint{
background:linear-gradient(180deg,rgba(15,15,24,.96),rgba(10,10,18,.92));
border:1px solid rgba(255,255,255,.07);
border-radius:14px;
padding:12px 14px;
}
.err{
display:none;
background:rgba(255,51,102,.12);
color:#ff9ab1;
border:1px solid rgba(255,51,102,.22);
border-radius:12px;
padding:10px 12px;
font-size:12px;
margin-top:10px;
}
.section-title{
font-size:14px;
font-weight:600;
font-family:var(--mono);
letter-spacing:.06em;
text-transform:uppercase;
margin-bottom:10px;
color:var(--text);
}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.meta{
display:flex;
justify-content:space-between;
gap:12px;
padding:8px 0;
border-top:1px solid rgba(255,255,255,.06);
}
.meta:first-child{border-top:0}
.meta-key{font-size:12px;color:var(--text-dim)}
.meta-val{font-size:12px;font-family:var(--mono);text-align:right;word-break:break-all;color:var(--text)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tab{
padding:8px 14px;
border-radius:999px;
border:1px solid transparent;
background:transparent;
color:var(--text-dim);
cursor:pointer;
transition:all .18s ease;
}
.tab:hover{color:var(--text)}
.tab.active{
background:var(--accent-soft);
border-color:rgba(255,51,102,.22);
color:#ffd4de;
box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.hidden{display:none}
@media(max-width:760px){.detail-grid{grid-template-columns:1fr}}
</style>
</head>

let state={page:'login',tab:'overview',session:null,user:null,org:null,orgs:[],memberships:[],role:null,detections:[],agents:[],policies:null,integration:null,integrationDraft:null,selected:null};

function resetApp(){if(pollTimer)clearInterval(pollTimer);pollTimer=null;state={page:'login',tab:'overview',session:null,user:null,org:null,orgs:[],memberships:[],role:null,detections:[],agents:[],policies:null,integration:null,integrationDraft:null,selected:null};}

function defaultIntegration(){return{enabled:false,kind:'splunk_hec',endpoint:'',index_name:'main',source:'ditm-armor-agent',source_type:'ditm:armor:agent',token_configured:false,updated_at:null};}

async function updatePolicies(next){state.policies=next;render();if(!state.org)return;await sbFetch(`policies?org_id=eq.${state.org.id}`,'PATCH',{enforcement_mode:next.enforcement_mode,protected_brands:next.protected_brands,allowlist:next.allowlist,blocklist:next.blocklist,modules:next.modules,updated_at:new Date().toISOString()});}

function copyText(value,label='Value'){navigator.clipboard.writeText(String(value||'')).then(()=>alert(`${label} copied.`)).catch(()=>alert(`Could not copy ${label.toLowerCase()}.`));}

async function testIntegration(){if(!state.org)return;const result=await sbFetch('rpc/send_org_siem_test','POST',{target_org:state.org.id});if(!result){alert('Could not queue a Splunk test event. Check the destination settings first.');return;}const row=Array.isArray(result)?result[0]:result;alert(row?.queued?`Splunk test event queued (request ${row.request_id}).`:'Splunk test event could not be queued.');}

function renderOverview(shell){const blocked=state.detections.filter(d=>d.action_taken==='blocked').length;const warned=state.detections.filter(d=>d.action_taken==='warned').length;const active=state.agents.filter(a=>a.status==='active').length;const metrics=el('div',{className:'metric-grid',style:{marginBottom:'16px'}});for(const[label,val,sub]of[['Enrolled agents',state.agents.length,'Browsers tied to this org'],['Online now',active,'Heartbeat active'],['Blocked events',blocked,'Recent prevention count'],['Warned events',warned,'User-visible warnings']])metrics.appendChild(el('div',{className:'card'},el('div',{className:'metric-label'},label),el('div',{className:'metric-val'},String(val)),el('div',{className:'metric-sub'},sub)));shell.appendChild(metrics);const model=el('div',{className:'card'});model.appendChild(el('div',{className:'section-title'},'Managed pilot mode'));model.appendChild(el('div',{className:'sub'},'DiTM handles most deployment and policy operations during the pilot. Your team deploys the agent, reviews detections in its SIEM, and reaches out when blocklists, allowlists, or enforcement mode need adjustment.'));shell.appendChild(model);const recent=el('div',{className:'card'});recent.appendChild(el('div',{className:'section-title'},'Recent activity summary'));if(!state.detections.length){recent.appendChild(el('div',{className:'sub'},'No detections yet. Once agents are enrolled, blocked and warned events will show up in your SIEM and here as a lightweight operational summary.'));shell.appendChild(recent);return;}for(const det of state.detections.slice(0,5)){recent.appendChild(el('div',{className:'list-item'},el('span',{className:`sev-${det.severity}`},det.severity),el('div',{className:'grow'},el('div',{style:{fontWeight:'600',fontSize:'13px'}},det.title),el('div',{className:'mono',style:{color:'var(--text-mid)'}},det.domain||det.url||'')),el('span',{className:`act-${det.action_taken}`},det.action_taken),el('div',{className:'mono'},ago(det.created_a function renderAlerts(shell){const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},'All detections'));if(!state.detections.length){card.appendChild(el('div',{className:'sub'},'No detections yet.'));shell.appendChild(card);return;}for(const det of state.detections){card.appendChild(el('div',{className:'list-item',onClick:()=>{state.selected=det;state.tab='detail';render();}},el('span',{className:`sev-${det.severity}`},det.severity),el('div',{className:'grow'},el('div',{style:{fontWeight:'600',fontSize:'13px'}},det.title),el('div',{className:'mono',style:{color:'var(--text-mid)'}},det.domain||'')),el('span',{className:`act-${det.action_taken}`},det.action_taken),el('div',{className:'mono'},ago(det.created_at))))}shell.appendChild(card);}

function renderDetail(shell){if(!state.selected)return;const det=state.selected;shell.appendChild(el('button',{className:'btn btn-secondary',style:{marginBottom:'12px'},onClick:()=>{state.tab='alerts';render();}},'Back'));const top=el('div',{className:'card'});top.appendChild(el('div',{className:'row',style:{marginBottom:'10px'}},el('span',{className:`sev-${det.severity}`},det.severity),el('span',{className:`act-${det.action_taken}`},det.action_taken),el('span',{className:'pill'},`Score ${det.risk_score||0}`)));top.appendChild(el('div',{style:{fontSize:'22px',fontWeight:'700',marginBottom:'6px'}},det.title));top.appendChild(el('div',{className:'mono',style:{color:'var(--text-mid)'}},`${det.domain||''} - ${det.user_email||det.agent_id||''}`));shell.appendChild(top);const grid=el('div',{className:'detail-grid'});const meta=el('div',{className:'card'},el('div',{className:'section-title'},'Metadata'));for(const[k,v]of[['Time',fmt(det.created_at)],['URL',det.url],['Domain',det.domain],['Agent',det.agent_id],['Module',det.module],['Score',det.risk_score]])meta.appendChild(el('div',{className:'meta'},el('span',{className:'meta-key'},k),el('span',{className:'meta-val'},String(v||'-'))));const signals=el('div',{className:'card'},el('div',{className:'section-title'},'Signals'));const items=Array.isArray(det.signals)?det.signals:[];if(!items.length)signals.appendChild(el('div',{className:'sub'},'No signals recorded'));for(const signal of items)signals.appendChild(el('div',{className:'hint',style:{marginBottom:'8px'}},typeof signal==='string'?signal:(signal.label||JSON.stringify(signal))));grid.appendChild(meta);grid.appendChild(signals);shell.appendChild(grid);}

function renderAgents(shell){const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},`Agents (${state.agents.length})`));if(!state.agents.length){card.appendChild(el('div',{className:'sub'},'No agents enrolled yet.'));shell.appendChild(card);return;}for(const agent of state.agents){const title=agent.device_name||agent.user_email||agent.id;const meta=[agent.user_email||agent.id,agent.browser||'-',agent.agent_version||'-'].filter(Boolean).join(' | ');card.appendChild(el('div',{className:'list-item'},el('div',{className:'grow'},el('div',{style:{fontWeight:'600',fontSize:'13px'}},title),el('div',{className:'mono',style:{color:'var(--text-mid)'}},meta)),el('span',{className:`act-${agent.status}`},agent.status),el('div',{className:'mono'},ago(agent.last_seen_at))))}shell.appendChild(card);}

function renderPolicies(shell){const p=state.policies;const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},'Policies'));if(!p){card.appendChild(el('div',{className:'sub'},'Loading policies...'));shell.appendChild(card);return;}const modeRow=el('div',{className:'row',style:{marginBottom:'14px'}});for(const mode of['block','warn','monitor'])modeRow.appendChild(el('button',{className:'btn '+(p.enforcement_mode===mode?'btn-primary':'btn-secondary'),onClick:()=>updatePolicies({...p,enforcement_mode:mode})},mode));card.appendChild(modeRow);for(const[key,label]of[['protected_brands','Protected brands'],['blocklist','Blocklist'],['allowlist','Allowlist']]){card.appendChild(el('div',{className:'label'},label));const hint=el('div',{className:'hint'});const items=Array.isArray(p[key])?p[key]:[];hint.textContent=items.length?items.join(', '):'No entries yet';card.appendChild(hint);}shell.appendChild(card);}

function renderDeployment(shell){const model=el('div',{className:'card'});model.appendChild(el('div',{className:'section-title'},'Deployment model'));model.appendChild(el('div',{className:'sub'},'This control plane is scoped to your organization. The company token below enrolls browsers into your org, while DiTM relays structured events from the backend into Splunk so analysts stay in their existing workflow.'));shell.appendChild(model);const token=el('div',{className:'card'});token.appendChild(el('div',{className:'section-title'},'Organization enrollment token'));token.appendChild(el('div',{className:'sub',style:{marginBottom:'10px'}},'Share this with employees during agent setup or prefill it in a managed rollout.'));token.appendChild(el('div',{className:'hint mono',style:{marginBottom:'10px'}},state.org?.enrollment_token||'...'));token.appendChild(el('button',{className:'btn btn-secondary',onClick:()=>copyText(state.org?.enrollment_token||'','Enrollment token')},'Copy token'));shell.appendChild(token);const install=el('div',{className:'card'});install.appendChild(el('div',{className:'section-title'},'Operational flow'));for(const item of['1. Install the DiTM Splunk app and set the org destination once in the Integrations tab.','2. Deploy the extension via Intune, GPO, or manual install.','3. Enroll users with the org token or a prefilled managed build.','4. Agents block locally, send events to the DiTM backend, and DiTM relays them to Splunk.'])install.appendChild(el('div',{className:'hint',style:{marginBottom:'8px'}},item));shell.appendChild(install);const ctx=el('div',{className:'card'});ctx.appendChild(el('div',{className:'section-title'},'Current admin context'));ctx.appendChild(el('div',{className:'hint mono',style:{marginBottom:'8px'}},`Signed in as: ${state.user?.email||'...'}`));ctx.appendChild(el('div',{className:'hint mono',style:{marginBottom:'8px'}},`Organization: ${state.org?.name||'...'}`));ctx.appendChild(el('div',{className:'hint mono'},`Role: ${state.role||'admin'}`));shell.appendChild(ctx);}
function renderIntegrations(shell){syncIntegrationDraft();const siem=state.integrationDraft||defaultIntegration();const card=el('div',{className:'card'});card.appendChild(el('div',{className:'section-title'},'Splunk destination'));card.appendChild(el('div',{className:'sub',style:{marginBottom:'12px'}},'Configure Splunk once for this organization. Agents report to the DiTM backend, and the backend relays detections and heartbeats into Splunk.'));const enabledInput=el('input',{id:'siem-enabled',type:'checkbox',onChange:e=>updateIntegrationDraft({enabled:e.target.checked})});enabledInput.checked=siem.enabled===true;const enabledRow=el('label',{className:'row',style:{marginBottom:'12px',gap:'10px',alignItems:'center'}},enabledInput,el('span',{className:'sub'},'Enable Splunk relay for this org'));card.appendChild(enabledRow);card.appendChild(el('div',{className:'label'},'HEC endpoint'));card.appendChild(el('input',{id:'siem-endpoint',className:'input',type:'text',placeholder:'https://splunk.company.com:8088',value:siem.endpoint||'',onInput:e=>updateIntegrationDraft({endpoint:e.target.value})}));card.appendChild(el('div',{className:'label'},'HEC token'));card.appendChild(el('input',{id:'siem-token',className:'input',type:'password',placeholder:siem.token_configured?'Leave blank to keep saved token':'Paste Splunk HEC token',value:siem.token||'',onInput:e=>updateIntegrationDraft({token:e.target.value})}));card.appendChild(el('div',{className:'label'},'Index'));card.appendChild(el('input',{id:'siem-index',className:'input',type:'text',placeholder:'main',value:siem.index_name||'main',onInput:e=>updateIntegrationDraft({index_name:e.target.value})}));card.appendChild(el('div',{className:'label'},'Source'));card.appendChild(el('input',{id:'siem-source',className:'input',type:'text',placeholder:'ditm-armor-agent',value:siem.source||'ditm-armor-agent',onInput:e=>updateIntegrationDraft({source:e.target.value})}));card.appendChild(el('div',{className:'label'},'Sourcetype'));card.appendChild(el('input',{id:'siem-sourcetype',className:'input',type:'text',placeholder:'ditm:armor:agent',value:siem.source_type||'ditm:armor:agent',onInput:e=>updateIntegrationDraft({source_type:e.target.value})}));card.appendChild(el('div',{className:'hint',style:{margin:'10px 0 14px'}},siem.token_configured?'A Splunk token is already stored for this org. Leave the token field blank to keep it.':'No Splunk token stored yet.'));card.appendChild(el('div',{className:'row'},el('button',{className:'btn btn-primary',onClick:saveIntegration},'Save destination'),el('button',{className:'btn btn-secondary',onClick:testIntegration},'Queue test event')));if((state.integration||{}).updated_at)card.appendChild(el('div',{className:'hint mono',style:{marginTop:'12px'}},`Last updated: ${fmt(state.integration.updated_at)}`));shell.appendChild(card);}

function render(){const app=$('#app');app.innerHTML='';if(state.page==='login'){renderLogin(app);return;}const shell=el('div',{className:'shell'});app.appendChild(shell);renderHeader(shell);renderTabs(shell);if(state.tab==='overview')renderOverview(shell);else if(state.tab==='agents')renderAgents(shell);else if(state.tab==='policies')renderPolicies(shell);else if(state.tab==='deployment')renderDeployment(shell);else if(state.tab==='integrations')renderIntegrations(shell);}

restore();
